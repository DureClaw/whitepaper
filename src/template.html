<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>DureClaw — Technical Whitepaper</title>
<style>
  @page { size: A4; margin: 17mm 15mm 16mm; }
  :root{
    --ink:#0f172a; --sub:#334155; --mut:#94a3b8; --line:#e2e8f0;
    --emerald:#059669; --emerald-bg:#ecfdf5; --emerald-line:#a7f3d0;
    --indigo:#4f46e5; --indigo-bg:#eef2ff; --code-bg:#0b1220; --code-ink:#cdd9e5;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",-apple-system,system-ui,sans-serif;
    color:var(--ink); font-size:10.5pt; line-height:1.66; -webkit-font-smoothing:antialiased;
  }
  .doc{ max-width:100%; }

  /* title block */
  h1{ font-size:30pt; font-weight:800; letter-spacing:-.5px; margin:0 0 2px; }
  h1::first-letter{ color:var(--emerald); }
  h1 + h2{ border:0; font-size:14pt; color:var(--sub); margin:6px 0 0; padding:0; }
  h1 + h2 + h3{ font-size:11pt; color:var(--mut); font-weight:600; margin:2px 0 0; }
  .meta{ font-size:9pt; color:var(--mut); margin-top:10px; }
  .meta a{ color:var(--indigo); text-decoration:none; }

  /* sections */
  h2{ font-size:15pt; font-weight:800; margin:22px 0 9px; padding-bottom:5px;
      border-bottom:2px solid var(--ink); page-break-after:avoid; }
  h3{ font-size:12pt; font-weight:700; color:var(--indigo); margin:15px 0 6px; page-break-after:avoid; }
  p{ margin:7px 0; color:var(--sub); }
  p strong, li strong, td strong{ color:var(--ink); font-weight:700; }
  a{ color:var(--indigo); }

  /* English translation lines */
  blockquote{ margin:8px 0; padding:6px 12px; border-left:3px solid var(--emerald-line);
      background:var(--emerald-bg); color:#3f6b57; font-size:9.6pt; font-style:italic; border-radius:0 6px 6px 0; }
  blockquote p{ color:#3f6b57; margin:2px 0; }

  /* lists */
  ul,ol{ margin:7px 0; padding-left:20px; }
  li{ margin:3px 0; color:var(--sub); }

  /* code / ascii diagrams — preserve spacing, never wrap */
  pre{ background:var(--code-bg); color:var(--code-ink); border-radius:8px; padding:12px 14px;
      font:8.6pt/1.5 "SFMono-Regular",Menlo,Consolas,monospace; overflow:hidden;
      white-space:pre; page-break-inside:avoid; margin:10px 0; }
  code{ font-family:"SFMono-Regular",Menlo,Consolas,monospace; font-size:9pt;
      background:#f1f5f9; padding:1px 5px; border-radius:4px; color:#0b1220; }
  pre code{ background:none; padding:0; color:inherit; font-size:inherit; }

  /* tables */
  table{ width:100%; border-collapse:collapse; margin:10px 0; font-size:9.4pt; page-break-inside:avoid; }
  th,td{ border:1px solid var(--line); padding:6px 9px; text-align:left; vertical-align:top; }
  th{ background:#f8fafc; font-weight:800; color:var(--ink); }
  td{ color:var(--sub); }

  hr{ border:0; border-top:1px solid var(--line); margin:18px 0; }
  h2{ page-break-inside:avoid; }

  .foot{ margin-top:22px; padding-top:8px; border-top:1px solid var(--line);
      font-size:8pt; color:var(--mut); text-align:center; }
</style>
</head>
<body>
<div class="doc">
$body$
</div>
</body>
</html>
